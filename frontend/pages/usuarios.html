<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Sistema Gestión Claro</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container no-sidebar">
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="btn btn-secondary" id="btnVolverMenu">⬅ Volver al Menú Principal</button>
                    <h1>Gestión de Usuarios</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="nuevoUsuarioBtn">+ Nuevo Usuario</button>
                    <div class="user-info">
                        <span class="user-name" id="userNameDisplay"></span>
                        <span class="user-role" id="userRoleDisplay"></span>
                        <span class="user-avatar">👤</span>
                    </div>
                    <button class="btn btn-danger" id="logoutBtn">Salir</button>
                </div>
            </header>

            <div class="card">
                <h3>Listado de Usuarios</h3>
                <div class="table-container">
                    <table class="table" id="usuarios-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Nombre Completo</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL NUEVO / EDITAR USUARIO -->
    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('modal-usuario')">&times;</span>
            <h2 id="modal-title">Nuevo Usuario</h2>
            <form id="form-usuario">
                <input type="hidden" id="user-id">
                <div class="form-group">
                    <label>Usuario (username)</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombre_completo" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Dejar vacío para no cambiar">
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select id="id_rol" required></select>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="activo">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('modal-usuario')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/usuarios.js"></script>
</body>

</html>
