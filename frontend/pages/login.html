<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestión</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Sistema de Gestión</h1>
                <p>Instalaciones y Solicitudes</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-icon"><input type="text" id="username" required placeholder="Ingrese su usuario"></div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-icon"><input type="password" id="password" required placeholder="Ingrese su contraseña"></div>
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión</button>
                <div id="loginMessage" class="login-message hidden"></div>
            </form>
            <div class="login-footer"><p>© 2026 Sistema de Gestión</p><p>v1.0.0</p></div>
        </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
