<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Claro Honduras</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container no-sidebar">
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="btn btn-secondary" id="btnVolverMenu">⬅ Volver al Menú Principal</button>
                    <h1>Solicitudes de Instalación</h1>
                </div>
                <div class="header-actions">
                    <div class="user-info">
                        <span class="user-name" id="userNameDisplay"></span>
                        <span class="user-role" id="userRoleDisplay"></span>
                    </div>
                    <button class="btn btn-danger" id="logoutBtn">Salir</button>
                </div>
            </header>

            <div class="filters-bar">
                <input type="text" id="search-solicitud" placeholder="Buscar por cliente, producto, localidad..."
                    style="flex:1; min-width:400px;">
                <button class="btn btn-primary" id="nuevaSolicitudBtn">+ Nueva Solicitud</button>
            </div>

            <div class="card">
                <h3>Listado de Solicitudes <span id="result-count" style="font-weight:normal;color:#666;"></span></h3>
                <div class="table-container">
                    <table class="table" id="solicitudes-table">
                        <thead>
                            <tr>
                                <th>N° Producto</th>
                                <th>Cliente</th>
                                <th>Localidad</th>
                                <th>Departamento</th>
                                <th>Servicio</th>
                                <th>Ancho Banda</th>
                                <th>Ingeniero</th>
                                <th>Estado</th>
                                <th>Fecha Estimada</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL CON X A LA DERECHA ARRIBA -->
    <div id="solicitudModal" class="modal">
        <div class="modal-content">
            <!-- Botón X bien a la derecha -->
            <span class="modal-close" onclick="closeModal('solicitudModal')">✕</span>

            <h3 id="modalTitle">Nueva Solicitud</h3>

            <form id="solicitudForm">
                <input type="hidden" id="id_nodo">

                <div class="form-row">
                    <div class="form-group">
                        <label>N° Producto</label>
                        <input type="text" id="numero_producto" readonly>
                    </div>
                    <div class="form-group">
                        <label>Cliente</label>
                        <input type="text" id="cliente" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Localidad</label>
                        <input type="text" id="localidad" required>
                    </div>
                    <div class="form-group">
                        <label>Departamento</label>
                        <input type="text" id="departamento" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Servicio</label>
                        <input type="text" id="servicio" value="Internet" required>
                    </div>
                    <div class="form-group">
                        <label>Ancho de Banda</label>
                        <input type="text" id="ancho_banda">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Medio</label>
                        <select id="id_medio"></select>
                    </div>
                    <div class="form-group">
                        <label>Ingeniero Asignado</label>
                        <select id="ingeniero_asignado"></select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="observaciones" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Fecha Estimada</label>
                    <input type="date" id="fecha_estimada_instalacion">
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('solicitudModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Solicitud</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/solicitudes.js"></script>
</body>

</html>
